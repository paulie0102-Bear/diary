<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>墨香時光日記 | 時光之河</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        :root {
            /* 調整色調以適配復古山水畫背景 */
            --paper-color: #dcdccf;
            --ink-color: #2c2e31;
            --seal-red: #8b1e1e;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--paper-color);
            font-family: "STKaiti", "KaiTi", serif; /* 古風楷體 */
            overflow-x: hidden;
        }

        /* --- 山水長卷背景：時光之河 --- */
        .scroll-canvas {
            position: relative;
            width: 100%;
            height: 300vh;
            background-image: url('https://raw.githubusercontent.com/paulie0102-Bear/diary/main/time.jpg');
            background-size: 100% 100%;
            background-attachment: local;
            background-repeat: no-repeat;
            background-position: top center;
        }

        /* --- ㄑ字型定位 --- */
        .node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            width: 140px;
        }

        .node-past { top: 15vh; right: 10%; }
        .node-present { top: 115vh; left: 10%; }
        .node-future { top: 215vh; right: 10%; }

        /* --- 美化圖示容器 (Z-Path 實作) --- */
        .icon-render {
            width: 110px; height: 110px; /* 稍微放大 */
            background: rgba(255, 255, 255, 0.6); /* 提高透明度融入畫作 */
            border: 2.5px solid var(--ink-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            box-shadow: 7px 7px 0px rgba(44, 46, 49, 0.4); /* 柔和硬陰影 */
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            position: relative;
            overflow: hidden; /* 防止動畫溢出 */
        }

        /* 墨色暈染效果 (新增) */
        .icon-render::before {
            content: '';
            position: absolute;
            width: 150%; height: 150%;
            background: radial-gradient(circle, rgba(44,46,49,0.1) 0%, rgba(220,220,207,0) 70%);
            top: -25%; left: -25%;
            z-index: -1;
        }

        /* 改用 Tabler Icons 文字圖示 (新增) */
        .icon-render i {
            font-size: 55px; /* 圖示大小 */
            color: var(--ink-color);
            transition: color 0.3s ease;
        }

        /* 點擊時的縮放與小動畫 */
        .node:active .icon-render {
            transform: scale(0.9) translate(4px, 4px);
            box-shadow: 0px 0px 0px rgba(44, 46, 49, 0.4);
        }

        /* 標籤：紅印章風格 */
        .node-label {
            background-color: var(--seal-red);
            color: white;
            padding: 5px 18px;
            border-radius: 2px;
            font-size: 17px;
            letter-spacing: 4px;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            text-indent: 4px;
            font-family: serif;
        }

        /* --- 彈窗樣式 --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--paper-color);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        .modal.active { transform: translateY(0); }

        .modal-header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .back-btn {
            font-size: 18px; color: var(--ink-color);
            background: none; border: 1.5px solid var(--ink-color);
            padding: 5px 15px; border-radius: 20px;
            cursor: pointer;
        }

        /* --- 底部工具欄 --- */
        .footer-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(220, 220, 207, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 20px calc(15px + var(--safe-bottom));
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(0,0,0,0.1);
            z-index: 50;
        }

        .footer-btn {
            background: none; border: none; font-size: 14px;
            color: #444; display: flex; align-items: center; gap: 8px;
            font-family: inherit;
            cursor: pointer;
        }

        /* --- 專屬動畫定義 (新增) --- */

        /* 1. 釣竿：揮桿動作 */
        .fish-action { animation: fishCastAnim 0.8s ease; }
        @keyframes fishCastAnim {
            0% { transform: translateY(0) rotate(0deg); }
            20% { transform: translateY(-10px) rotate(-10deg); } /* 蓄力 */
            50% { transform: translateY(-40px) rotate(25deg); } /* 揮桿最高點 */
            80% { transform: translateY(-5px) rotate(-5deg); } /* 回彈 */
            100% { transform: translateY(0) rotate(0deg); }
        }

        /* 2. 日曆：翻頁動作 */
        .flip-action { animation: calendarFlipAnim 0.8s ease; }
        @keyframes calendarFlipAnim {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* 3. 瓶中信：晃動動作 */
        .pop-action { animation: bottleShakeAnim 0.8s ease; }
        @keyframes bottleShakeAnim {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            15% { transform: translateX(-15px) rotate(-10deg); }
            30% { transform: translateX(10px) rotate(5deg); }
            45% { transform: translateX(-10px) rotate(-5deg); }
            60% { transform: translateX(5px) rotate(2deg); }
            75% { transform: translateX(-5px) rotate(-1deg); }
        }
    </style>
    <style>
    /* --- 憶往昔專用 CSS --- */
    .calendar-container {
        padding: 10px 20px;
        background: rgba(255,255,255,0.2);
    }
    .calendar-nav {
        display: flex; justify-content: space-between; margin-bottom: 15px;
    }
    .calendar-nav button {
        background: none; border: 1px solid var(--ink-color); 
        border-radius: 15px; padding: 2px 12px; font-family: inherit;
    }
    .calendar-weekdays {
        display: grid; grid-template-columns: repeat(7, 1fr);
        text-align: center; font-weight: bold; margin-bottom: 10px; color: var(--seal-red);
    }
    .calendar-days {
        display: grid; grid-template-columns: repeat(7, 1fr);
        gap: 8px;
    }
    .day-cell {
        aspect-ratio: 1; border: 1px solid rgba(0,0,0,0.05);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        position: relative; border-radius: 4px; transition: 0.2s;
    }
    .day-cell.active { background: rgba(255,255,255,0.5); box-shadow: inset 0 0 5px rgba(0,0,0,0.1); }
    .day-num { font-size: 14px; z-index: 2; }
    
    /* 心情印章圖示 */
    .mood-seal {
        position: absolute; width: 24px; height: 24px;
        background: var(--seal-red); color: white;
        border-radius: 50%; font-size: 12px; line-height: 24px;
        text-align: center; opacity: 0.8; transform: rotate(-10deg);
        bottom: 2px; right: 2px;
    }

    .day-detail {
        margin: 20px; padding: 20px; flex: 1;
        border: 1px dashed var(--ink-color); border-radius: 12px;
        background: rgba(255,255,255,0.4); overflow-y: auto;
    }
    .detail-hint { color: #888; text-align: center; margin-top: 50px; }
    .diary-entry { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
    
</head>
<body>

    <div class="scroll-canvas">
        <div class="node node-past" onclick="playAnim(this, 'past-modal', 'fish-action')">
            <div class="icon-render">
                <i class="ti ti-fish-hook"></i>
            </div>
            <div class="node-label">憶．往昔</div>
        </div>

        <div class="node node-present" onclick="playAnim(this, 'present-modal', 'flip-action')">
            <div class="icon-render">
                <i class="ti ti-calendar-event"></i>
            </div>
            <div class="node-label">看．今朝</div>
        </div>

        <div class="node node-future" onclick="playAnim(this, 'future-modal', 'pop-action')">
            <div class="icon-render">
                <i class="ti ti-bottle"></i>
            </div>
            <div class="node-label">寄．明月</div>
        </div>
    </div>

    <div class="footer-bar">
        <button class="footer-btn" onclick="exportData()">📤 匯出存檔</button>
        <button class="footer-btn" onclick="document.getElementById('fileInput').click()">📥 讀取存檔</button>
        <input type="file" id="fileInput" accept=".json" style="display:none;" onchange="importData(event)">
    </div>

    <div id="present-modal" class="modal">
        <div class="modal-header">
            <button class="back-btn" onclick="closeModal('present-modal')">〈 歸去</button>
            <div style="flex:1; text-align:center; font-weight:bold; font-size: 1.2rem;">墨跡記述</div>
        </div>
        <div style="padding:25px; flex: 1; display: flex; flex-direction: column;">
            <textarea id="diaryBox" style="width:100%; flex: 1; background: rgba(255,255,255,0.3); border: 1px solid #999; border-radius:12px; padding:20px; font-size:18px; line-height:1.8; font-family: KaiTi, serif; outline: none;" placeholder="此刻心境，化作筆墨..."></textarea>
            <button onclick="saveDiary()" style="width:100%; margin: 25px 0; padding:18px; background:var(--ink-color); color:white; border:none; border-radius:12px; font-size:18px; letter-spacing: 2px;">封存心情</button>
        </div>
    </div>
    
    <div id="past-modal" class="modal">
    <div class="modal-header">
        <button class="back-btn" onclick="closeModal('past-modal')">〈 歸去</button>
        <div id="calendar-title" style="flex:1; text-align:center; font-weight:bold; font-size: 1.2rem;">二零二六．三月</div>
    </div>
    <div class="calendar-container">
        <div class="calendar-nav">
            <button onclick="changeMonth(-1)">〈 前月</button>
            <button onclick="changeMonth(1)">後月 〉</button>
        </div>
        <div class="calendar-weekdays">
            <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
        </div>
        <div id="calendar-days" class="calendar-days"></div>
    </div>
    <div id="day-detail" class="day-detail">
        <div class="detail-hint">點擊日期，翻閱往昔墨跡</div>
    </div>
</div>
    <div id="future-modal" class="modal"><div class="modal-header"><button class="back-btn" onclick="closeModal('future-modal')">〈 歸去</button></div><div style="padding:20px;"><h2>未來信件...</h2></div></div>

    <script>

let currentViewDate = new Date();

    // 擴充：初始化日曆
    function initCalendar() {
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        
        // 更新標題
        const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
        document.getElementById('calendar-title').innerText = `${year}．${monthNames[month]}`;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const daysContainer = document.getElementById('calendar-days');
        daysContainer.innerHTML = '';

        // 填充空白
        for (let i = 0; i < firstDay; i++) {
            daysContainer.appendChild(document.createElement('div'));
        }

        // 填充日期
        for (let d = 1; d <= daysInMonth; d++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            cell.innerHTML = `<span class="day-num">${d}</span>`;
            
            // 檢查該日是否有日記 (格式: ink_diary_YYYY-MM-DD)
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const hasData = Object.keys(localStorage).some(key => key.includes(dateStr) || checkOldFormat(key, dateStr));

            if (hasData) {
                cell.innerHTML += `<div class="mood-seal">墨</div>`;
            }

            cell.onclick = () => showDayDetail(dateStr);
            daysContainer.appendChild(cell);
        }
    }

    // 格式轉換檢查（相容舊有的 timestamp 存檔）
    function checkOldFormat(key, targetDateStr) {
        if (!key.startsWith('ink_diary_')) return false;
        const ts = parseInt(key.split('_')[2]);
        if (isNaN(ts)) return false;
        const d = new Date(ts);
        const dStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        return dStr === targetDateStr;
    }

    function changeMonth(step) {
        currentViewDate.setMonth(currentViewDate.getMonth() + step);
        initCalendar();
    }

    function showDayDetail(dateStr) {
        const detailBox = document.getElementById('day-detail');
        const entries = Object.keys(localStorage)
            .filter(key => key.includes(dateStr) || checkOldFormat(key, dateStr))
            .map(key => localStorage.getItem(key));

        if (entries.length > 0) {
            detailBox.innerHTML = `<div class="diary-entry">
                <div style="color:var(--seal-red); font-weight:bold; margin-bottom:10px;">📅 ${dateStr}</div>
                <div style="line-height:1.8;">${entries.join('<hr style="border:0.5px dashed #ccc">')}</div>
            </div>`;
        } else {
            detailBox.innerHTML = `<div class="detail-hint">該日無墨跡留存</div>`;
        }
    }

    // 修改原本的 saveDiary，加上日期標籤以便搜尋
    const originalSaveDiary = saveDiary;
    saveDiary = function() {
        const text = document.getElementById('diaryBox').value;
        if(!text) return alert("請寫下您的心情");
        const now = new Date();
        const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        // 存檔名稱包含日期，方便日曆檢索
        const key = `ink_diary_${dateStr}_${now.getTime()}`;
        localStorage.setItem(key, text);
        alert("心情已封存於時光長河。");
        closeModal('present-modal');
        document.getElementById('diaryBox').value = "";
        initCalendar(); // 刷新日曆狀態
    };

    // 點擊「憶往昔」時初始化日曆
    const originalPlayAnim = playAnim;
    playAnim = function(element, modalId, animClass) {
        originalPlayAnim(element, modalId, animClass);
        if (modalId === 'past-modal') {
            setTimeout(initCalendar, 600);
        }
    };



        
        // 播放動畫後開啟彈窗
        function playAnim(element, modalId, animClass) {
            const iconBox = element.querySelector('.icon-render');
            iconBox.classList.add(animClass); // 起動專屬動畫
            
            // 延遲 0.6 秒等待動畫播放完畢後打開彈窗
            setTimeout(() => {
                iconBox.classList.remove(animClass);
                document.getElementById(modalId).classList.add('active');
            }, 600);
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // 存檔至 LocalStorage
        function saveDiary() {
            const text = document.getElementById('diaryBox').value;
            if(!text) return alert("請寫下您的心情");
            const key = 'ink_diary_' + new Date().getTime();
            localStorage.setItem(key, text);
            alert("心情已封存於時光長河。");
            closeModal('present-modal');
            document.getElementById('diaryBox').value = ""; // 清空
        }

        // 匯出 JSON 檔案
        function exportData() {
            const data = JSON.stringify(localStorage);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `diary_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 讀取 JSON 檔案並覆蓋
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!confirm("讀取備份將會覆蓋現有資料，確定繼續嗎？")) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    localStorage.clear();
                    Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                    alert("讀取成功！頁面將自動刷新。");
                    location.reload();
                } catch (err) { alert("無效的備份檔案格式。"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
