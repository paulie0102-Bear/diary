<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>墨香時光日記 | 時光之河</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        :root {
            /* 調整色調以適配復古山水畫背景 */
            --paper-color: #dcdccf;
            --ink-color: #2c2e31;
            --seal-red: #8b1e1e;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--paper-color);
            font-family: "STKaiti", "KaiTi", serif; /* 古風楷體 */
            overflow-x: hidden;
        }

        /* --- 山水長卷背景：時光之河 --- */
        .scroll-canvas {
            position: relative;
            width: 100%;
            height: 300vh;
            background-image: url('https://raw.githubusercontent.com/paulie0102-Bear/diary/main/time.jpg');
            background-size: 100% 100%;
            background-attachment: local;
            background-repeat: no-repeat;
            background-position: top center;
        }

        /* --- ㄑ字型定位 --- */
        .node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            width: 140px;
        }

        .node-past { top: 15vh; right: 10%; }
        .node-present { top: 115vh; left: 10%; }
        .node-future { top: 215vh; right: 10%; }

        /* --- 美化圖示容器 (Z-Path 實作) --- */
        .icon-render {
            width: 110px; height: 110px; /* 稍微放大 */
            background: rgba(255, 255, 255, 0.6); /* 提高透明度融入畫作 */
            border: 2.5px solid var(--ink-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            box-shadow: 7px 7px 0px rgba(44, 46, 49, 0.4); /* 柔和硬陰影 */
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            position: relative;
            overflow: hidden; /* 防止動畫溢出 */
        }

        /* 墨色暈染效果 (新增) */
        .icon-render::before {
            content: '';
            position: absolute;
            width: 150%; height: 150%;
            background: radial-gradient(circle, rgba(44,46,49,0.1) 0%, rgba(220,220,207,0) 70%);
            top: -25%; left: -25%;
            z-index: -1;
        }

        /* 改用 Tabler Icons 文字圖示 (新增) */
        .icon-render i {
            font-size: 55px; /* 圖示大小 */
            color: var(--ink-color);
            transition: color 0.3s ease;
        }

        /* 點擊時的縮放與小動畫 */
        .node:active .icon-render {
            transform: scale(0.9) translate(4px, 4px);
            box-shadow: 0px 0px 0px rgba(44, 46, 49, 0.4);
        }

        /* 標籤：紅印章風格 */
        .node-label {
            background-color: var(--seal-red);
            color: white;
            padding: 5px 18px;
            border-radius: 2px;
            font-size: 17px;
            letter-spacing: 4px;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            text-indent: 4px;
            font-family: serif;
        }

        /* --- 彈窗樣式 --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--paper-color);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        .modal.active { transform: translateY(0); }

        .modal-header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .back-btn {
            font-size: 18px; color: var(--ink-color);
            background: none; border: 1.5px solid var(--ink-color);
            padding: 5px 15px; border-radius: 20px;
            cursor: pointer;
        }

        /* --- 底部工具欄 --- */
        .footer-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(220, 220, 207, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 20px calc(15px + var(--safe-bottom));
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(0,0,0,0.1);
            z-index: 50;
        }

        .footer-btn {
            background: none; border: none; font-size: 14px;
            color: #444; display: flex; align-items: center; gap: 8px;
            font-family: inherit;
            cursor: pointer;
        }

        /* --- 專屬動畫定義 (新增) --- */

        /* 1. 釣竿：揮桿動作 */
        .fish-action { animation: fishCastAnim 0.8s ease; }
        @keyframes fishCastAnim {
            0% { transform: translateY(0) rotate(0deg); }
            20% { transform: translateY(-10px) rotate(-10deg); } /* 蓄力 */
            50% { transform: translateY(-40px) rotate(25deg); } /* 揮桿最高點 */
            80% { transform: translateY(-5px) rotate(-5deg); } /* 回彈 */
            100% { transform: translateY(0) rotate(0deg); }
        }

        /* 2. 日曆：翻頁動作 */
        .flip-action { animation: calendarFlipAnim 0.8s ease; }
        @keyframes calendarFlipAnim {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* 3. 瓶中信：晃動動作 */
        .pop-action { animation: bottleShakeAnim 0.8s ease; }
        @keyframes bottleShakeAnim {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            15% { transform: translateX(-15px) rotate(-10deg); }
            30% { transform: translateX(10px) rotate(5deg); }
            45% { transform: translateX(-10px) rotate(-5deg); }
            60% { transform: translateX(5px) rotate(2deg); }
            75% { transform: translateX(-5px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div class="scroll-canvas">
        <div class="node node-past" onclick="playAnim(this, 'past-modal', 'fish-action')">
            <div class="icon-render">
                <i class="ti ti-fish-hook"></i>
            </div>
            <div class="node-label">憶．往昔</div>
        </div>

        <div class="node node-present" onclick="playAnim(this, 'present-modal', 'flip-action')">
            <div class="icon-render">
                <i class="ti ti-calendar-event"></i>
            </div>
            <div class="node-label">看．今朝</div>
        </div>

        <div class="node node-future" onclick="playAnim(this, 'future-modal', 'pop-action')">
            <div class="icon-render">
                <i class="ti ti-bottle"></i>
            </div>
            <div class="node-label">寄．明月</div>
        </div>
    </div>

    <div class="footer-bar">
        <button class="footer-btn" onclick="exportData()">📤 匯出存檔</button>
        <button class="footer-btn" onclick="document.getElementById('fileInput').click()">📥 讀取存檔</button>
        <input type="file" id="fileInput" accept=".json" style="display:none;" onchange="importData(event)">
    </div>

    <div id="present-modal" class="modal">
        <div class="modal-header">
            <button class="back-btn" onclick="closeModal('present-modal')">〈 歸去</button>
            <div style="flex:1; text-align:center; font-weight:bold; font-size: 1.2rem;">墨跡記述</div>
        </div>
        <div style="padding:25px; flex: 1; display: flex; flex-direction: column;">
            <textarea id="diaryBox" style="width:100%; flex: 1; background: rgba(255,255,255,0.3); border: 1px solid #999; border-radius:12px; padding:20px; font-size:18px; line-height:1.8; font-family: KaiTi, serif; outline: none;" placeholder="此刻心境，化作筆墨..."></textarea>
            <button onclick="saveDiary()" style="width:100%; margin: 25px 0; padding:18px; background:var(--ink-color); color:white; border:none; border-radius:12px; font-size:18px; letter-spacing: 2px;">封存心情</button>
        </div>
    </div>
    
    <div id="past-modal" class="modal"><div class="modal-header"><button class="back-btn" onclick="closeModal('past-modal')">〈 歸去</button></div><div style="padding:20px;"><h2>歷史回憶...</h2></div></div>
    <div id="future-modal" class="modal"><div class="modal-header"><button class="back-btn" onclick="closeModal('future-modal')">〈 歸去</button></div><div style="padding:20px;"><h2>未來信件...</h2></div></div>

    <script>
        // 播放動畫後開啟彈窗
        function playAnim(element, modalId, animClass) {
            const iconBox = element.querySelector('.icon-render');
            iconBox.classList.add(animClass); // 起動專屬動畫
            
            // 延遲 0.6 秒等待動畫播放完畢後打開彈窗
            setTimeout(() => {
                iconBox.classList.remove(animClass);
                document.getElementById(modalId).classList.add('active');
            }, 600);
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // 存檔至 LocalStorage
        function saveDiary() {
            const text = document.getElementById('diaryBox').value;
            if(!text) return alert("請寫下您的心情");
            const key = 'ink_diary_' + new Date().getTime();
            localStorage.setItem(key, text);
            alert("心情已封存於時光長河。");
            closeModal('present-modal');
            document.getElementById('diaryBox').value = ""; // 清空
        }

        // 匯出 JSON 檔案
        function exportData() {
            const data = JSON.stringify(localStorage);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `diary_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 讀取 JSON 檔案並覆蓋
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!confirm("讀取備份將會覆蓋現有資料，確定繼續嗎？")) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    localStorage.clear();
                    Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                    alert("讀取成功！頁面將自動刷新。");
                    location.reload();
                } catch (err) { alert("無效的備份檔案格式。"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
