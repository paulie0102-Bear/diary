<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>墨香山水日記</title>
    <style>
        :root {
            /* 調整色調以適配山水畫 */
            --paper: #f4f0e6; /* 宣紙底色 */
            --ink: #2c2e31;   /* 墨色 */
            --seal-red: #a61e1e; /* 印章紅 */
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--paper);
            font-family: "STKaiti", "KaiTi", serif; /* 古風楷體 */
            overflow-x: hidden; /* 防止橫向捲動 */
        }

        /* --- 山水長卷背景 --- */
        .scroll-canvas {
            position: relative;
            width: 100%;
            height: 300vh; /* 三倍身高，形成長幅捲軸 */
            /* 統一長背景：宣紙紋理 + 遠山渲染 
               使用了來自 Transparent Textures 的宣紙紋理與自製的水墨遠山漸層 
            */
            background-image: 
                url('https://www.transparenttextures.com/patterns/handmade-paper.png'), /* 宣紙紋理層 */
                linear-gradient(180deg, rgba(244,240,230,0) 0%, rgba(220,215,200,0.8) 30%, rgba(180,175,160,1) 100%), /* 遠山渲染漸層 */
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="3000" viewBox="0 0 1000 3000"><path d="M0 100C150 150 250 50 400 100C550 150 650 50 800 100C950 150 1050 50 1200 100V3000H0V100Z" fill="%23dcd5c5" opacity="0.5"/><path d="M0 200C200 250 300 150 500 200C700 250 800 150 1000 200V3000H0V200Z" fill="%23c8c2b0" opacity="0.5"/><path d="M0 300C250 350 350 250 600 300C850 350 950 250 1200 300V3000H0V300Z" fill="%23b4ae9c" opacity="0.5"/></svg>'); /* 自製 SVG 水墨遠山 */
            background-attachment: local, local, local;
            background-size: auto, 100% 100%, 100% 100%;
            background-position: top left, top left, top left;
        }

        /* --- ㄑ字型定位 (Z-Path) --- */
        .node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            width: 140px;
        }

        /* 右上：過去 (在遠山雲霧間) */
        .node-past { top: 15vh; right: 12%; }
        /* 左中：現在 (在近景山腳下) */
        .node-present { top: 115vh; left: 12%; }
        /* 右下：未來 (在深潭明月旁) */
        .node-future { top: 215vh; right: 12%; }

        /* --- 渲染圖標容器 (調整半透明以融入畫作) --- */
        .icon-render {
            width: 100px; height: 100px;
            background: rgba(255, 255, 255, 0.7); /* 提高透明度，更輕盈 */
            border: 2px solid var(--ink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            box-shadow: 6px 6px 0px rgba(44, 46, 49, 0.5); /* 柔和硬陰影 */
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(2px); /* 輕微模糊背景山水 */
        }

        /* 內嵌 SVG (同前版本) */
        .icon-render svg {
            width: 50px; height: 50px;
            stroke: var(--ink);
            fill: none;
            stroke-width: 1.5;
        }

        /* 點擊時的縮放與小動畫 (同前版本) */
        .node:active .icon-render {
            transform: scale(0.9) translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--ink);
        }

        /* 標籤：紅印章風格 (同前版本) */
        .node-label {
            background-color: var(--seal-red);
            color: white;
            padding: 4px 12px;
            border-radius: 2px;
            font-size: 16px;
            letter-spacing: 3px;
            font-weight: bold;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        /* --- 彈窗與底部工具 (同前版本) --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--paper);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.4s ease-out;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        .modal.active { transform: translateY(0); }

        .modal-header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .back-btn {
            font-size: 18px; color: var(--ink);
            background: none; border: 1.5px solid var(--ink);
            padding: 5px 15px; border-radius: 20px;
        }

        .footer-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(244, 240, 230, 0.95);
            backdrop-filter: blur(8px);
            padding: 10px 20px calc(15px + var(--safe-bottom));
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #ccc;
            z-index: 50;
        }

        .footer-btn {
            background: none; border: none; font-size: 14px;
            color: #555; display: flex; align-items: center; gap: 6px;
        }

        /* --- 動畫效果 (同前版本) --- */
        .fish-action { animation: fishAnim 0.8s ease; }
        @keyframes fishAnim { 0% { transform: translateY(0); } 50% { transform: translateY(-30px) rotate(-15deg); } 100% { transform: translateY(0); } }
        .flip-action { animation: flipAnim 0.8s ease; }
        @keyframes flipAnim { 0% { transform: rotateY(0); } 100% { transform: rotateY(360deg); } }
        .pop-action { animation: popAnim 0.8s ease; }
        @keyframes popAnim { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="scroll-canvas">
        <div class="node node-past" onclick="playAnim(this, 'past-modal', 'fish-action')">
            <div class="icon-render">
                <svg viewBox="0 0 24 24"><path d="M16 9v5l-4 4l-4 -4v-5l4 -2z"/><path d="M11 7V3"/><path d="M9 3h6"/></svg>
            </div>
            <div class="node-label">憶．往昔</div>
        </div>

        <div class="node node-present" onclick="playAnim(this, 'present-modal', 'flip-action')">
            <div class="icon-render">
                <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2"/><line x1="16" y1="3" x2="16" y2="7"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="4" y1="11" x2="20" y2="11"/><rect x="8" y="14" width="2" height="2"/></svg>
            </div>
            <div class="node-label">看．今朝</div>
        </div>

        <div class="node node-future" onclick="playAnim(this, 'future-modal', 'pop-action')">
            <div class="icon-render">
                <svg viewBox="0 0 24 24"><path d="M10 5h4v2a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1v-2z"/><path d="M14 7c3 0 4 2 4 6v6a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2v-6c0 -4 1 -6 4 -6"/><line x1="10" y1="13" x2="14" y2="13"/><line x1="10" y1="17" x2="14" y2="17"/></svg>
            </div>
            <div class="node-label">寄．明月</div>
        </div>
    </div>

    <div class="footer-bar">
        <button class="footer-btn" onclick="exportData()">📤 匯出</button>
        <button class="footer-btn" onclick="document.getElementById('fileInput').click()">📥 讀取</button>
        <input type="file" id="fileInput" accept=".json" style="display:none;" onchange="importData(event)">
    </div>

    <div id="present-modal" class="modal">
        <div class="modal-header">
            <button class="back-btn" onclick="closeModal('present-modal')">〈 歸去</button>
            <div style="flex:1; text-align:center; font-weight:bold;">墨跡記述</div>
        </div>
        <div style="padding:20px;">
            <textarea id="diaryBox" style="width:100%; height:300px; background:transparent; border:1px solid #999; border-radius:10px; padding:15px; font-size:18px; line-height:1.6; font-family: KaiTi, serif;" placeholder="此時此刻，心中所想..."></textarea>
            <button onclick="saveDiary()" style="width:100%; margin-top:20px; padding:15px; background:var(--ink); color:white; border:none; border-radius:10px; font-size:18px;">封存心情</button>
        </div>
    </div>
    
    <div id="past-modal" class="modal"><div class="modal-header"><button class="back-btn" onclick="closeModal('past-modal')">〈 歸去</button></div><div style="padding:20px;"><h2>歷史回憶...</h2></div></div>
    <div id="future-modal" class="modal"><div class="modal-header"><button class="back-btn" onclick="closeModal('future-modal')">〈 歸去</button></div><div style="padding:20px;"><h2>未來信件...</h2></div></div>

    <script>
        function playAnim(element, modalId, animClass) {
            const icon = element.querySelector('.icon-render');
            icon.classList.add(animClass);
            setTimeout(() => {
                icon.classList.remove(animClass);
                document.getElementById(modalId).classList.add('active');
            }, 600);
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function saveDiary() {
            const text = document.getElementById('diaryBox').value;
            if(!text) return;
            localStorage.setItem('ink_diary_' + Date.now(), text);
            alert("心情已化作微塵，封存成功。");
            closeModal('present-modal');
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(localStorage)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `ink_diary_backup.json`;
            a.click();
        }

        function importData(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = JSON.parse(e.target.result);
                Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                location.reload();
            };
            reader.readAsText(event.target.files[0]);
        }
    </script>
</body>
</html>
