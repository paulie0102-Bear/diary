<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>墨香時光日記 | 時光之河</title>
    <style>
        :root {
            --paper-color: #dcdccf;
            --ink-color: #2c2e31;
            --seal-red: #8b1e1e;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--paper-color);
            font-family: "STKaiti", "KaiTi", serif;
            overflow-x: hidden;
        }

        /* --- 山水長卷背景：時光之河 --- */
        .scroll-canvas {
            position: relative;
            width: 100%;
            height: 300vh;
            /* 整合您的 GitHub 圖片網址 */
            background-image: url('https://raw.githubusercontent.com/paulie0102-Bear/diary/main/time.jpg');
            background-size: 100% 100%;
            background-attachment: local;
            background-repeat: no-repeat;
            background-position: top center;
        }

        /* --- ㄑ字型定位 (Z-Path) --- */
        .node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            width: 140px;
        }

        /* 過去 (右上)：對應瀑布起點 */
        .node-past { top: 15vh; right: 10%; }

        /* 現在 (左中)：對應河流涼亭 */
        .node-present { top: 115vh; left: 10%; }

        /* 未來 (右下)：對應明月漁舟 */
        .node-future { top: 215vh; right: 10%; }

        /* --- 渲染圖標容器 --- */
        .icon-render {
            width: 100px; height: 100px;
            background: rgba(255, 255, 255, 0.7);
            border: 2.5px solid var(--ink-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            box-shadow: 6px 6px 0px rgba(44, 46, 49, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
        }

        .icon-render svg {
            width: 50px; height: 50px;
            stroke: var(--ink-color);
            fill: none;
            stroke-width: 1.5;
        }

        .node:active .icon-render {
            transform: scale(0.9) translate(4px, 4px);
            box-shadow: 0px 0px 0px rgba(44, 46, 49, 0.4);
        }

        .node-label {
            background-color: var(--seal-red);
            color: white;
            padding: 5px 15px;
            border-radius: 2px;
            font-size: 17px;
            letter-spacing: 4px;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            text-indent: 4px; /* 修正字距造成的偏移 */
        }

        /* --- 彈窗樣式 --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--paper-color);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        .modal.active { transform: translateY(0); }

        .modal-header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .back-btn {
            font-size: 18px; color: var(--ink-color);
            background: none; border: 1.5px solid var(--ink-color);
            padding: 5px 15px; border-radius: 20px;
        }

        /* --- 底部工具欄 (避開 iOS 觸控) --- */
        .footer-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(220, 220, 207, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 20px calc(15px + var(--safe-bottom));
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(0,0,0,0.1);
            z-index: 50;
        }

        .footer-btn {
            background: none; border: none; font-size: 14px;
            color: #444; display: flex; align-items: center; gap: 8px;
            font-family: inherit;
        }

        /* --- 動畫定義 --- */
        .fish-action { animation: fishAnim 0.8s ease; }
        @keyframes fishAnim { 0% { transform: translateY(0); } 50% { transform: translateY(-30px) rotate(-15deg); } 100% { transform: translateY(0); } }
        .flip-action { animation: flipAnim 0.8s ease; }
        @keyframes flipAnim { 0% { transform: rotateY(0); } 100% { transform: rotateY(360deg); } }
        .pop-action { animation: popAnim 0.8s ease; }
        @keyframes popAnim { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="scroll-canvas">
        <div class="node node-past" onclick="playAnim(this, 'past-modal', 'fish-action')">
            <div class="icon-render">
                <svg viewBox="0 0 24 24"><path d="M16 9v5l-4 4l-4 -4v-5l4 -2z"/><path d="M11 7V3"/><path d="M9 3h6"/></svg>
            </div>
            <div class="node-label">憶．往昔</div>
        </div>

        <div class="node node-present" onclick="playAnim(this, 'present-modal', 'flip-action')">
            <div class="icon-render">
                <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2"/><line x1="16" y1="3" x2="16" y2="7"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="4" y1="11" x2="20" y2="11"/><rect x="8" y="14" width="2" height="2"/></svg>
            </div>
            <div class="node-label">看．今朝</div>
        </div>

        <div class="node node-future" onclick="playAnim(this, 'future-modal', 'pop-action')">
            <div class="icon-render">
                <svg viewBox="0 0 24 24"><path d="M10 5h4v2a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1v-2z"/><path d="M14 7c3 0 4 2 4 6v6a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2v-6c0 -4 1 -6 4 -6"/><line x1="10" y1="13" x2="14" y2="13"/><line x1="10" y1="17" x2="14" y2="17"/></svg>
            </div>
            <div class="node-label">寄．明月</div>
        </div>
    </div>

    <div class="footer-bar">
        <button class="footer-btn" onclick="exportData()">📤 匯出存檔</button>
        <button class="footer-btn" onclick="document.getElementById('fileInput').click()">📥 讀取存檔</button>
        <input type="file" id="fileInput" accept=".json" style="display:none;" onchange="importData(event)">
    </div>

    <div id="present-modal" class="modal">
        <div class="modal-header">
            <button class="back-btn" onclick="closeModal('present-modal')">〈 歸去</button>
            <div style="flex:1; text-align:center; font-weight:bold; font-size: 1.2rem;">墨跡記述</div>
        </div>
        <div style="padding:25px; flex: 1; display: flex; flex-direction: column;">
            <textarea id="diaryBox" style="width:100%; flex: 1; background: rgba(255,255,255,0.3); border: 1px solid #999; border-radius:12px; padding:20px; font-size:18px; line-height:1.8; font-family: KaiTi, serif; outline: none;" placeholder="此刻心境，化作筆墨..."></textarea>
            <button onclick="saveDiary()" style="width:100%; margin: 25px 0; padding:18px; background:var(--ink-color); color:white; border:none; border-radius:12px; font-size:18px; letter-spacing: 2px;">封存心情</button>
        </div>
    </div>
    
    <div id="past-modal" class="modal"><div class="modal-header"><button class="back-btn" onclick="closeModal('past-modal')">〈 歸去</button></div><div style="padding:20px;"><h2>歷史回憶...</h2></div></div>
    <div id="future-modal" class="modal"><div class="modal-header"><button class="back-btn" onclick="closeModal('future-modal')">〈 歸去</button></div><div style="padding:20px;"><h2>未來信件...</h2></div></div>

    <script>
        // 播放動畫後開啟彈窗
        function playAnim(element, modalId, animClass) {
            const icon = element.querySelector('.icon-render');
            icon.classList.add(animClass);
            setTimeout(() => {
                icon.classList.remove(animClass);
                document.getElementById(modalId).classList.add('active');
            }, 600);
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // 存檔至 LocalStorage
        function saveDiary() {
            const text = document.getElementById('diaryBox').value;
            if(!text) return alert("請寫下您的心情");
            const key = 'ink_diary_' + new Date().getTime();
            localStorage.setItem(key, text);
            alert("心情已封存於時光長河。");
            closeModal('present-modal');
            document.getElementById('diaryBox').value = ""; // 清空
        }

        // 匯出 JSON 檔案
        function exportData() {
            const data = JSON.stringify(localStorage);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `diary_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 讀取 JSON 檔案並覆蓋
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!confirm("讀取備份將會覆蓋現有資料，確定繼續嗎？")) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    localStorage.clear();
                    Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                    alert("讀取成功！頁面將自動刷新。");
                    location.reload();
                } catch (err) { alert("無效的備份檔案格式。"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
