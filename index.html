<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>墨香時光日記 | 時光之河</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        :root {
            /* 調整色調以適配復古山水畫背景 */
            --paper-color: #dcdccf;
            --ink-color: #2c2e31;
            --seal-red: #8b1e1e;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--paper-color);
            font-family: "STKaiti", "KaiTi", serif; /* 古風楷體 */
            overflow-x: hidden;
        }

        /* --- 山水長卷背景：時光之河 --- */
        .scroll-canvas {
            position: relative;
            width: 100%;
            height: 300vh;
            background-image: url('https://raw.githubusercontent.com/paulie0102-Bear/diary/main/time.jpg');
            background-size: 100% 100%;
            background-attachment: local;
            background-repeat: no-repeat;
            background-position: top center;
        }

        /* --- ㄑ字型定位 --- */
        .node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            width: 140px;
        }

        .node-past { top: 15vh; right: 10%; }
        .node-present { top: 115vh; left: 10%; }
        .node-future { top: 215vh; right: 10%; }

        /* --- 美化圖示容器 (Z-Path 實作) --- */
        .icon-render {
            width: 110px; height: 110px; /* 稍微放大 */
            background: rgba(255, 255, 255, 0.6); /* 提高透明度融入畫作 */
            border: 2.5px solid var(--ink-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            box-shadow: 7px 7px 0px rgba(44, 46, 49, 0.4); /* 柔和硬陰影 */
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            position: relative;
            overflow: hidden; /* 防止動畫溢出 */
        }

        /* 墨色暈染效果 (新增) */
        .icon-render::before {
            content: '';
            position: absolute;
            width: 150%; height: 150%;
            background: radial-gradient(circle, rgba(44,46,49,0.1) 0%, rgba(220,220,207,0) 70%);
            top: -25%; left: -25%;
            z-index: -1;
        }

        /* 改用 Tabler Icons 文字圖示 (新增) */
        .icon-render i {
            font-size: 55px; /* 圖示大小 */
            color: var(--ink-color);
            transition: color 0.3s ease;
        }

        /* 點擊時的縮放與小動畫 */
        .node:active .icon-render {
            transform: scale(0.9) translate(4px, 4px);
            box-shadow: 0px 0px 0px rgba(44, 46, 49, 0.4);
        }

        /* 標籤：紅印章風格 */
        .node-label {
            background-color: var(--seal-red);
            color: white;
            padding: 5px 18px;
            border-radius: 2px;
            font-size: 17px;
            letter-spacing: 4px;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            text-indent: 4px;
            font-family: serif;
        }

        /* --- 彈窗樣式 --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--paper-color);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        .modal.active { transform: translateY(0); }

        .modal-header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .back-btn {
            font-size: 18px; color: var(--ink-color);
            background: none; border: 1.5px solid var(--ink-color);
            padding: 5px 15px; border-radius: 20px;
            cursor: pointer;
        }

        /* --- 底部工具欄 --- */
        .footer-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(220, 220, 207, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 20px calc(15px + var(--safe-bottom));
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(0,0,0,0.1);
            z-index: 50;
        }

        .footer-btn {
            background: none; border: none; font-size: 14px;
            color: #444; display: flex; align-items: center; gap: 8px;
            font-family: inherit;
            cursor: pointer;
        }

        /* --- 專屬動畫定義 (新增) --- */

        /* 1. 釣竿：揮桿動作 */
        .fish-action { animation: fishCastAnim 0.8s ease; }
        @keyframes fishCastAnim {
            0% { transform: translateY(0) rotate(0deg); }
            20% { transform: translateY(-10px) rotate(-10deg); } /* 蓄力 */
            50% { transform: translateY(-40px) rotate(25deg); } /* 揮桿最高點 */
            80% { transform: translateY(-5px) rotate(-5deg); } /* 回彈 */
            100% { transform: translateY(0) rotate(0deg); }
        }

        /* 2. 日曆：翻頁動作 */
        .flip-action { animation: calendarFlipAnim 0.8s ease; }
        @keyframes calendarFlipAnim {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* 3. 瓶中信：晃動動作 */
        .pop-action { animation: bottleShakeAnim 0.8s ease; }
        @keyframes bottleShakeAnim {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            15% { transform: translateX(-15px) rotate(-10deg); }
            30% { transform: translateX(10px) rotate(5deg); }
            45% { transform: translateX(-10px) rotate(-5deg); }
            60% { transform: translateX(5px) rotate(2deg); }
            75% { transform: translateX(-5px) rotate(-1deg); }
        }
    </style>
    <style>
    /* --- 憶往昔專用 CSS --- */
    .calendar-container {
        padding: 10px 20px;
        background: rgba(255,255,255,0.2);
    }
    .calendar-nav {
        display: flex; justify-content: space-between; margin-bottom: 15px;
    }
    .calendar-nav button {
        background: none; border: 1px solid var(--ink-color); 
        border-radius: 15px; padding: 2px 12px; font-family: inherit;
    }
    .calendar-weekdays {
        display: grid; grid-template-columns: repeat(7, 1fr);
        text-align: center; font-weight: bold; margin-bottom: 10px; color: var(--seal-red);
    }
    .calendar-days {
        display: grid; grid-template-columns: repeat(7, 1fr);
        gap: 8px;
    }
    .day-cell {
        aspect-ratio: 1; border: 1px solid rgba(0,0,0,0.05);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        position: relative; border-radius: 4px; transition: 0.2s;
    }
    .day-cell.active { background: rgba(255,255,255,0.5); box-shadow: inset 0 0 5px rgba(0,0,0,0.1); }
    .day-num { font-size: 14px; z-index: 2; }
    
    /* 心情印章圖示 */
    .mood-seal {
    position: absolute;
    width: 20px;
    height: 20px;
    color: white;
    border-radius: 3px; /* 改成稍微方正的印章感 */
    font-size: 11px;
    line-height: 20px;
    text-align: center;
    bottom: 4px;
    right: 4px;
    opacity: 0.9;
    transform: rotate(-8deg);
    font-family: "STKaiti", serif;
    box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}

    .day-detail {
        margin: 20px; padding: 20px; flex: 1;
        border: 1px dashed var(--ink-color); border-radius: 12px;
        background: rgba(255,255,255,0.4); overflow-y: auto;
    }
    .detail-hint { color: #888; text-align: center; margin-top: 50px; }
    .diary-entry { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .ink-tag {
    background: rgba(44, 46, 49, 0.05); /* 更輕透的墨色 */
    color: var(--ink-color);
    padding: 2px 10px;
    border-radius: 2px; /* 稍微方正一點點，更像印章或籤條 */
    font-size: 13px;
    border: 1px dashed rgba(44, 46, 49, 0.3); /* 改用虛線，增加手作感 */
    display: inline-block;
    font-family: "STKaiti", "KaiTi", serif; /* 回歸楷體，維持整體風格 */
    margin-top: 4px;
    vertical-align: middle;
}
</style>
<style>
    /* --- 看今朝專用 CSS --- */
    .writing-container {
        padding: 25px; flex: 1; display: flex; flex-direction: column;
        transition: background 1.5s ease; /* 抒情燈切換效果 */
    }

    /* 抒情燈狀態 */
    .lyric-lamp {
        background: radial-gradient(circle, rgba(255,165,0,0.15) 0%, rgba(244,240,230,0) 80%) !important;
        box-shadow: inset 0 0 100px rgba(255,140,0,0.1);
    }

    .mood-selector {
        display: flex; justify-content: space-around; margin-bottom: 15px;
    }
    .mood-item {
        padding: 5px 12px; border: 1px solid #ccc; border-radius: 15px;
        cursor: pointer; font-size: 14px; transition: 0.3s;
    }
    .mood-item.selected {
        background: var(--seal-red); color: white; border-color: var(--seal-red);
    }

    #diaryBox {
        width: 100%; flex: 1; background: transparent; border: 1px solid rgba(0,0,0,0.1);
        border-radius: 12px; padding: 20px; font-size: 18px; line-height: 1.8;
        outline: none; resize: none;
    }

    .tag-input-area { margin: 15px 0; }
    #tagInput {
        width: 100%; background: transparent; border: none;
        border-bottom: 1px solid #999; padding: 5px; font-family: inherit;
    }

    .save-btn {
        width: 100%; padding: 18px; background: var(--ink-color);
        color: white; border: none; border-radius: 12px; font-size: 18px;
    }

    /* 季節粒子動畫 */
    .particle {
        position: absolute; pointer-events: none;
        animation: fall linear infinite;
    }
    @keyframes fall {
        0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
    }
</style>
    <style>
    /* --- 寄明月專用 CSS --- */
    .future-container { padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .future-tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
    .future-tabs button {
        background: none; border: 1px solid var(--ink-color); padding: 5px 20px;
        border-radius: 20px; font-family: inherit; cursor: pointer;

    .future-tabs button.active { background: var(--ink-color); color: white; }

    #futureText {

    }

    .lock-setting { margin: 20px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .lock-setting input { border: 1px solid #999; border-radius: 5px; padding: 5px; background: transparent; }

    /* 瓶中信列表 */
    .bottle-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
    .bottle-item {
        text-align: center; cursor: pointer; position: relative;
        padding: 10px; border: 1px dashed rgba(0,0,0,0.1); border-radius: 8px;
    }
    .bottle-item i { font-size: 40px; color: var(--ink-color); }
    .bottle-item span { display: block; font-size: 12px; margin-top: 5px; color: #666; }
    
    /* 鎖定遮罩 */
    .locked-overlay {
        filter: grayscale(1) blur(2px);
        opacity: 0.6;
    }
    
</style>
</head>

    <script>

let currentViewDate = new Date();
let selectedMood = "平";
        
    // 擴充：初始化日曆
    function initCalendar() {
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        
        // 更新標題
        const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
        document.getElementById('calendar-title').innerText = `${year}．${monthNames[month]}`;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const daysContainer = document.getElementById('calendar-days');
        daysContainer.innerHTML = '';

        // 填充空白
        for (let i = 0; i < firstDay; i++) {
            daysContainer.appendChild(document.createElement('div'));
        }

        // 填充日期
        // 在 initCalendar 的日期循環中修改這段：
for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    cell.innerHTML = `<span class="day-num">${d}</span>`;
    
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    
    // 尋找當天的資料並判斷心情
    const entryKey = Object.keys(localStorage).find(key => key.includes(dateStr) || checkOldFormat(key, dateStr));

    if (entryKey) {
        let sealColor = 'var(--seal-red)'; // 預設紅色
        let moodLabel = '墨';
        
        try {
            const data = JSON.parse(localStorage.getItem(entryKey));
            // 根據心情設定印章顏色
            if (data.mood === '喜') { sealColor = '#e67e22'; moodLabel = '喜'; } // 暖橘
            if (data.mood === '憂') { sealColor = '#5d6d7e'; moodLabel = '憂'; } // 灰藍
            if (data.mood === '憤') { sealColor = '#2c3e50'; moodLabel = '憤'; } // 濃墨黑
            if (data.mood === '平') { sealColor = '#8b1e1e'; moodLabel = '平'; } // 標準硃砂紅
        } catch(e) { /* 舊資料維持紅色 */ }

        cell.innerHTML += `<div class="mood-seal" style="background:${sealColor}">${moodLabel}</div>`;
    }

    cell.onclick = () => showDayDetail(dateStr);
    daysContainer.appendChild(cell);
}
    }

    // 格式轉換檢查（相容舊有的 timestamp 存檔）
    function checkOldFormat(key, targetDateStr) {
        if (!key.startsWith('ink_diary_')) return false;
        const ts = parseInt(key.split('_')[2]);
        if (isNaN(ts)) return false;
        const d = new Date(ts);
        const dStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        return dStr === targetDateStr;
    }

    function changeMonth(step) {
        currentViewDate.setMonth(currentViewDate.getMonth() + step);
        initCalendar();
    }

    function showDayDetail(dateStr) {
    const detailBox = document.getElementById('day-detail');
    
    const entryKeys = Object.keys(localStorage).filter(key => 
        key.includes(dateStr) || checkOldFormat(key, dateStr)
    );

    if (entryKeys.length > 0) {
        let htmlContent = `<div style="color:var(--seal-red); font-weight:bold; margin-bottom:15px; font-size:1.1rem; border-left: 4px solid var(--seal-red); padding-left: 10px;">📅 ${dateStr}</div>`;
        
        const moodMap = { '喜': '😊', '平': '😐', '憂': '😔', '憤': '💢' };

        // 排序，讓同一天的日記按時間順序排列
        entryKeys.sort().forEach(key => {
            const rawData = localStorage.getItem(key);
            let displayData = { text: "", tag: "", mood: "" };

            try {
                const parsed = JSON.parse(rawData);
                displayData.text = parsed.text || "";
                displayData.tag = parsed.tag ? parsed.tag.trim() : ""; // 去掉首尾空格
                displayData.mood = parsed.mood || "";
            } catch (e) {
                displayData.text = rawData;
            }

            // 只有當標籤真的有字時才渲染標籤 HTML
            const tagHTML = displayData.tag 
                ? `<span class="ink-tag">${displayData.tag.startsWith('#') ? displayData.tag : '#' + displayData.tag}</span>` 
                : '';

            htmlContent += `
                <div class="diary-entry" style="margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px dashed rgba(0,0,0,0.1);">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                        ${displayData.mood ? `<span style="font-size: 1.2rem; filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.1));">${moodMap[displayData.mood] || ''}</span>` : ''}
                        ${tagHTML}
                    </div>
                    <div style="line-height:1.8; color: var(--ink-color); white-space: pre-wrap; font-size: 17px; letter-spacing: 1px;">${displayData.text}</div>
                </div>
            `;
        });
        detailBox.innerHTML = htmlContent;
    } else {
        detailBox.innerHTML = `<div class="detail-hint" style="color:#888; text-align:center; margin-top:50px; font-style: italic;">── 該日無墨跡留存 ──</div>`;
    }
}

    // 修改原本的 saveDiary，加上日期標籤以便搜尋
    const originalSaveDiary = saveDiary;
    saveDiary = function() {
    const text = document.getElementById('diaryBox').value;
    const tag = document.getElementById('tagInput').value; // 取得標籤
    if(!text) return alert("請寫下您的心情");

    const now = new Date();
    const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    
    // 將資料打包成物件
    const diaryData = {
        text: text,
        tag: tag,
        mood: typeof selectedMood !== 'undefined' ? selectedMood : '平', // 抓取選擇的心情
        time: now.getTime()
    };

    const key = `ink_diary_${dateStr}_${now.getTime()}`;
    
    // 儲存時轉為 JSON 字串
    localStorage.setItem(key, JSON.stringify(diaryData));
    
    alert("心情已封存於時光長河。");
    closeModal('present-modal');
    
    // 清空輸入欄位
    document.getElementById('diaryBox').value = "";
    document.getElementById('tagInput').value = "";
    
    if (typeof initCalendar === 'function') initCalendar(); // 刷新日曆
};
    // 點擊「憶往昔」時初始化日曆
    const originalPlayAnim = playAnim;
    playAnim = function(element, modalId, animClass) {
        originalPlayAnim(element, modalId, animClass);
        if (modalId === 'past-modal') {
            setTimeout(initCalendar, 600);
        }
    };

function selectMood(mood, el) {
        selectedMood = mood;
        document.querySelectorAll('.mood-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
    }

    // 感應負面字眼與時間
    function checkMoodContext(text) {
        const container = document.getElementById('writing-area');
        const negativeWords = ['累', '難過', '傷心', '憂鬱', '痛', '失敗', '想哭', '煩'];
        const isNegative = negativeWords.some(word => text.includes(word));
        const hour = new Date().getHours();
        const isMidnight = (hour >= 23 || hour <= 5);

        if (isNegative || isMidnight) {
            container.classList.add('lyric-lamp');
        } else {
            container.classList.remove('lyric-lamp');
        }
    }

// 切換頁籤
    function toggleFutureView(view) {
        document.getElementById('future-write-area').style.display = (view === 'write' ? 'block' : 'none');
        document.getElementById('future-list-area').style.display = (view === 'list' ? 'block' : 'none');
        document.getElementById('tab-write').className = (view === 'write' ? 'active' : '');
        document.getElementById('tab-list').className = (view === 'list' ? 'active' : '');
        if(view === 'list') renderBottleList();
    }

    // 儲存未來信件
    function saveFutureLetter() {
        const text = document.getElementById('futureText').value;
        const unlockDate = document.getElementById('unlockDate').value;

        if(!text || !unlockDate) return alert("請填寫內容並選擇啟封日期。");
        
        const today = new Date().toISOString().split('T')[0];
        if(unlockDate <= today) return alert("啟封日期必須是未來。");

        const futureData = {
            text: text,
            unlockDate: unlockDate,
            createDate: new Date().getTime(),
            isFuture: true
        };

        localStorage.setItem(`ink_future_${new Date().getTime()}`, JSON.stringify(futureData));
        alert("信件已裝瓶，漂向未來的彼岸。");
        document.getElementById('futureText').value = "";
        closeModal('future-modal');
    }

    // 渲染瓶子列表
    function renderBottleList() {
        const listContainer = document.getElementById('bottle-list');
        listContainer.innerHTML = '';
        const today = new Date().toISOString().split('T')[0];

        Object.keys(localStorage).filter(k => k.startsWith('ink_future_')).forEach(key => {
            const data = JSON.parse(localStorage.getItem(key));
            const isLocked = data.unlockDate > today;
            
            const item = document.createElement('div');
            item.className = `bottle-item ${isLocked ? 'locked-overlay' : ''}`;
            item.onclick = () => openFutureLetter(data, isLocked);
            
            item.innerHTML = `
                <i class="ti ti-bottle"></i>
                <span>${data.unlockDate}</span>
                ${isLocked ? '<div style="font-size:10px;">🔒 未屆</div>' : '<div style="font-size:10px; color:var(--seal-red);">🔓 可讀</div>'}
            `;
            listContainer.appendChild(item);
        });
    }

    // 開啟未來信件
    function openFutureLetter(data, isLocked) {
        if(isLocked) {
            alert(`時機未至。此信將在 ${data.unlockDate} 隨潮汐而來。`);
            // 觸發抖動效果
            const icon = document.querySelector('.node-future .icon-render');
            icon.classList.add('pop-action');
            setTimeout(() => icon.classList.remove('pop-action'), 800);
            return;
        }
        
        alert(`來自過去的訊息：\n\n${data.text}`);
    }

    
        
    // 季節粒子生成器
    function initSeasonEffects() {
    const container = document.getElementById('season-particles');
    const month = new Date().getMonth() + 1;
    let config = { char: '🌸', color: '#ffb7c5', shadow: 'none' }; 

    if (month >= 3 && month <= 5) {
        // 春：櫻花
        config = { char: '🌸', color: '#ffb7c5', shadow: 'none' };
    } 
    else if (month >= 6 && month <= 8) {
        // 夏：翠竹葉與螢火蟲微光 (改用綠色葉片與光點)
        const isFirefly = Math.random() > 0.5;
        config = isFirefly 
            ? { char: '●', color: '#d4fc79', shadow: '0 0 10px #d4fc79' } // 螢火蟲
            : { char: '🍃', color: '#2d5a27', shadow: 'none' };           // 竹葉
    } 
    else if (month >= 9 && month <= 11) {
        // 秋：楓葉
        config = { char: '🍁', color: '#d35400', shadow: 'none' };
    } 
    else {
        // 冬：下雪
        config = { char: '❄️', color: '#ffffff', shadow: '0 0 5px #fff' };
    }

    for (let i = 0; i < 20; i++) {
        createParticle(container, config);
    }
}

function createParticle(container, config) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.innerText = config.char;
    p.style.left = Math.random() * 100 + 'vw';
    p.style.fontSize = (config.char === '●' ? '6px' : (Math.random() * 10 + 12) + 'px');
    p.style.animationDuration = (Math.random() * 5 + 7) + 's'; // 夏天稍微慢一點，比較悠閒
    p.style.animationDelay = (Math.random() * 5) + 's';
    p.style.color = config.color;
    p.style.textShadow = config.shadow;
    p.style.opacity = config.char === '●' ? '0.8' : '1';
    container.appendChild(p);
}

    // 修改儲存邏輯，整合標籤與心情
    function saveDiary() {
        const text = document.getElementById('diaryBox').value;
        const tag = document.getElementById('tagInput').value;
        if(!text) return alert("請寫下您的心情");
        
        const now = new Date();
        const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

        };

        // 清空並重整日曆

    }

    // 初始化季節
    window.onload = initSeasonEffects;

        
        // 播放動畫後開啟彈窗
        function playAnim(element, modalId, animClass) {
            const iconBox = element.querySelector('.icon-render');
            iconBox.classList.add(animClass); // 起動專屬動畫
            
            // 延遲 0.6 秒等待動畫播放完畢後打開彈窗
            setTimeout(() => {
                iconBox.classList.remove(animClass);
                document.getElementById(modalId).classList.add('active');
            }, 600);
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // 存檔至 LocalStorage
        function saveDiary() {
            const text = document.getElementById('diaryBox').value;
            if(!text) return alert("請寫下您的心情");
            const key = 'ink_diary_' + new Date().getTime();
            localStorage.setItem(key, text);
            alert("心情已封存於時光長河。");
            closeModal('present-modal');
            document.getElementById('diaryBox').value = ""; // 清空
        }

        // 匯出 JSON 檔案
        function exportData() {
            const data = JSON.stringify(localStorage);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `diary_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 讀取 JSON 檔案並覆蓋
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!confirm("讀取備份將會覆蓋現有資料，確定繼續嗎？")) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    localStorage.clear();
                    Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                    alert("讀取成功！頁面將自動刷新。");
                    location.reload();
                } catch (err) { alert("無效的備份檔案格式。"); }
            };
            reader.readAsText(file);
        }
    </script>
